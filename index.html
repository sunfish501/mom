<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>엄마 생신 축하 편지</title>

  <!-- Google Fonts — 손편지 느낌의 명조 (font-display: swap) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

  <!-- AOS (스크롤 등장) — CDN. 로드 실패 시 script.js의 IntersectionObserver 폴백 -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- 우리 스타일은 AOS 뒤에 로드해서 필요한 부분만 덮어씀 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 0. 배경 레이어 (전역, 고정): 그라디언트 + 순수 CSS 별빛 -->
  <div class="backdrop" aria-hidden="true"></div>
  <div class="stars stars--a" aria-hidden="true"></div>
  <div class="stars stars--b" aria-hidden="true"></div>

  <main class="letter">

    <!-- 1. Intro (인사) — 타자기 효과, 자동 재생 -->
    <section class="section section--intro" id="intro">
      <div class="intro__inner">
        <h1 class="intro__text">
          <span id="typed"></span><span class="cursor" aria-hidden="true">|</span>
        </h1>
      </div>
      <!-- 스크롤 유도 화살표 힌트 -->
      <div class="scroll-hint" id="scrollHint" aria-hidden="true">↓</div>
    </section>

    <!-- 편지 유리 카드 (상단): 생신 축하 -->
    <div class="letter-card">

      <!-- 2. Birthday (생신 축하) — 스크롤 등장 + 골드 글로우 -->
      <section class="section section--birthday" id="birthday" data-aos="fade-up">
        <p class="birthday__text" id="birthdayText"></p>
      </section>

    </div>

    <!-- 2.5 Cosmic Scale (내 마음의 크기) — 풀블리드 sticky 스테이지.
         장식 파트: 저사양에서 깨져도 아래 편지 본문 가독성/기능엔 영향 없게 격리. -->
    <section class="cosmic" id="cosmic" aria-label="내 마음의 크기">
      <div class="cosmic-stage">
        <div class="cosmic-body body-moon"     data-stage="0"><span class="cosmic-caption"></span></div>
        <div class="cosmic-body body-earth"    data-stage="1"><span class="cosmic-caption"></span></div>
        <div class="cosmic-body body-jupiter"  data-stage="2"><span class="cosmic-caption"></span></div>
        <div class="cosmic-body body-sun"      data-stage="3"><span class="cosmic-caption"></span></div>
        <div class="cosmic-body body-blackhole" data-stage="4"><span class="cosmic-caption"></span></div>
        <div class="cosmic-body finale-love" data-stage="5">
          <!-- 하트: 인라인 SVG로 절차적 생성 (이미지 없음). 로즈→골드 그라디언트 + drop-shadow 글로우. -->
          <svg class="heart" viewBox="0 0 32 29.6" preserveAspectRatio="xMidYMid meet" aria-hidden="true" focusable="false">
            <defs>
              <radialGradient id="heartGrad" cx="50%" cy="34%" r="72%">
                <stop offset="0%"   stop-color="#E5989B"/>
                <stop offset="68%"  stop-color="#F3D27A"/>
                <stop offset="100%" stop-color="#E9B949"/>
              </radialGradient>
            </defs>
            <path fill="url(#heartGrad)" d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4 c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
          </svg>
          <span class="cosmic-caption"></span>
        </div>
      </div>
    </section>

    <!-- 편지 봉투 섹션: 풀블리드 sticky 스테이지.
         편지(유리 카드)는 화면에서 안 움직이고, 봉투(플랩+포켓)만 스크롤에 따라 벗겨지며 사라짐.
         장식 파트: 실패해도 봉투가 그냥 안 보일 뿐 편지 본문은 항상 읽을 수 있음(격리). -->
    <section class="envelope" id="envelope">
      <div class="envelope-stage">
        <div class="envelope-wrap">

          <!-- 편지 유리 카드 (하단): 편지 본문 + 맺음말 — 봉투 밑에서 고정, 위치 안 움직임 -->
          <div class="letter-card">

            <!-- 3. Letter Body (편지 본문) -->
            <!-- ▼▼▼ 편지 본문 시작 — 정의겸이 직접 작성할 부분 ▼▼▼ -->
            <!-- content.js 의 LETTER.body 배열을 수정하세요. 아래 문단은 script.js가 자동 생성합니다. -->
            <section class="section section--body" id="letterBody">
              <!-- 문단(<p>)은 script.js가 LETTER.body 를 순회하며 생성합니다.
                   본문 텍스트엔 골드/글로우/움직임 이펙트 없음 — 등장 페이드만. -->
            </section>
            <!-- ▲▲▲ 편지 본문 끝 ▲▲▲ -->

            <!-- 4. Sign-off (맺음말) — 스크롤 등장 → 컨페티 피날레 -->
            <section class="section section--signoff" id="signoff" data-aos="fade-up">
              <p class="signoff__text" id="signoffText"></p>
            </section>

          </div>

          <!-- 봉투 오버레이: 플랩(위)이 뒤로 열리고, 포켓(전체)이 아래로 벗겨지며 사라짐 -->
          <div class="envelope-front" id="envelopeFront" aria-hidden="true">
            <div class="envelope-pocket"></div>
            <div class="envelope-flap"></div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <!-- canvas-confetti (서명부 피날레) — CDN. 없으면 조용히 생략 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <!-- AOS JS — CDN -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <!-- 순서 중요: content.js (데이터) 먼저, script.js (로직) 나중 -->
  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
